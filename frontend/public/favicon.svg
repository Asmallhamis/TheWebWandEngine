<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 魔杖木材质感渐变 -->
    <linearGradient id="wandGradient" x1="16" y1="48" x2="48" y2="16" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#78350F" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    
    <!-- 顶端紫粉色魔法水晶渐变 -->
    <linearGradient id="crystalGradient" x1="40" y1="24" x2="56" y2="8" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#9333EA" />
        <stop offset="100%" stop-color="#F0ABFC" />
    </linearGradient>
    
    <!-- 外发光虚化效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景法力光环底色 -->
  <circle cx="48" cy="16" r="12" fill="#C084FC" opacity="0.35" filter="url(#glow)" />
  
  <!-- 引擎元素：旋转魔法阵/齿轮 (Engine概念) -->
  <circle cx="48" cy="16" r="9" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="2 4" fill="none" opacity="0.9" style="transform-origin: 48px 16px; animation: spin 10s linear infinite;"/>

  <!-- 魔杖杖身 -->
  <path d="M12 52 C 10 54, 8 52, 10 50 L 40 20 L 44 24 Z" fill="url(#wandGradient)" />
  
  <!-- 魔杖手柄防滑贴图 (皮质握把) -->
  <path d="M 16 46 L 22 52 L 20 54 L 14 48 Z" fill="#451A03" />
  <path d="M 21 41 L 27 47 L 25 49 L 19 43 Z" fill="#451A03" />

  <!-- 杖尖魔法水晶 -->
  <path d="M 40 20 L 48 8 L 56 16 L 48 28 Z" fill="url(#crystalGradient)" />
  
  <!-- 水晶内部高光 -->
  <path d="M 48 8 L 51 16 L 48 24 L 45 16 Z" fill="#FFFFFF" opacity="0.5" />

  <!-- 魔法四角星火花 1 (大) -->
  <path d="M 58 4 L 60 0 L 62 4 L 66 6 L 62 8 L 60 12 L 58 8 L 54 6 Z" fill="#FDF4FF" filter="url(#glow)"/>
  
  <!-- 魔法四角星火花 2 (小) -->
  <path d="M 34 6 L 35 3 L 36 6 L 39 7 L 36 8 L 35 11 L 34 8 L 31 7 Z" fill="#E879F9" opacity="0.8" />

  <!-- CSS 齿轮旋转动画 -->
  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</svg>
