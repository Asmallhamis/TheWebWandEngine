<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 极光/深空调色底盘渐变，体现现代化赛博色彩 -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="30%" stop-color="#312E81" />
      <stop offset="70%" stop-color="#4C1D95" />
      <stop offset="100%" stop-color="#831843" />
    </linearGradient>

    <!-- 魔杖光柱的白亮至全息透明渐变 -->
    <linearGradient id="wandCore" x1="100" y1="412" x2="412" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#E0E7FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0.3"/>
    </linearGradient>

    <!-- 闪耀的金色光芒渐变 -->
    <linearGradient id="starGlow" x1="410" y1="20" x2="490" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>

    <!-- 青蓝色法力引擎光晕 -->
    <linearGradient id="engineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- 图标边缘投影与发光滤镜 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-4" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 现代化的圆角矩形 App 图标底板 -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGradient)" filter="url(#softShadow)"/>
  <rect x="32" y="32" width="448" height="448" rx="100" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  
  <!-- 抽象的 Engine 内部机制 (轻盈的同心圆与虚线圈) -->
  <circle cx="256" cy="256" r="160" stroke="#E0E7FF" stroke-width="4" stroke-opacity="0.08" fill="none" />
  <circle cx="256" cy="256" r="120" stroke="url(#engineGlow)" stroke-width="3" stroke-opacity="0.6" fill="none" stroke-dasharray="12 16" style="transform-origin: 256px 256px; animation: spinReverse 20s linear infinite;" />
  <circle cx="256" cy="256" r="80" stroke="#F472B6" stroke-width="2" stroke-opacity="0.2" fill="none" />
  
  <!-- 一层轻盈透亮的玻璃态弥散光球 -->
  <circle cx="350" cy="162" r="90" fill="url(#engineGlow)" opacity="0.3" filter="url(#neonGlow)"/>

  <!-- 抽象几何体构成的流线型魔法杖 -->
  <!-- 尾部的深色握把槽 -->
  <rect x="120" y="364" width="80" height="28" rx="14" transform="rotate(-45 120 364)" fill="#0F172A" opacity="0.6" />
  <rect x="156" y="328" width="60" height="28" rx="14" transform="rotate(-45 156 328)" fill="#0F172A" opacity="0.6" />

  <!-- 光柱杖身 -->
  <rect x="120" y="364" width="310" height="18" rx="9" transform="rotate(-45 120 364)" fill="url(#wandCore)" filter="url(#softShadow)"/>
  
  <!-- 杖尖聚焦的纯白核心星芒 -->
  <circle cx="360" cy="152" r="20" fill="#FFFFFF" filter="url(#neonGlow)"/>
  
  <!-- 极其现代的四角星耀斑 / 飞溅的碎片 -->
  <path d="M 450 50 Q 450 100 500 100 Q 450 100 450 150 Q 450 100 400 100 Q 450 100 450 50 Z" fill="url(#starGlow)" filter="url(#softShadow)"/>
  
  <path d="M 120 80 Q 120 100 140 100 Q 120 100 120 120 Q 120 100 100 100 Q 120 100 120 80 Z" fill="#38BDF8" opacity="0.8" filter="url(#neonGlow)"/>
  <path d="M 380 380 Q 380 400 400 400 Q 380 400 380 420 Q 380 400 360 400 Q 380 400 380 380 Z" fill="#A78BFA" opacity="0.5"/>

  <!-- 动画：反向旋转 -->
  <style>
    @keyframes spinReverse { 100% { transform: rotate(-360deg); } }
  </style>
</svg>
